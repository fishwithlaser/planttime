apiVersion: influxdata.com/v2alpha1
kind: Dashboard
metadata:
  name: planttime
spec:
  name: PlantTime
  description: Hydroponic sensor dashboard
  charts:
    - kind: Single_Stat_Plus_Line
      name: pH
      xCol: _time
      yCol: _value
      position: overlaid
      width: 6
      height: 3
      xPos: 0
      yPos: 0
      decimalPlaces: 2
      axes:
        - base: "10"
          name: x
          scale: linear
        - base: "10"
          name: y
          scale: linear
      queries:
        - query: |-
            from(bucket: "planttime")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "sensors")
              |> filter(fn: (r) => r["sensor_type"] == "ph")
              |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
      colors:
        - id: base
          name: viridian
          type: text
          hex: "#32B08C"
    - kind: Single_Stat_Plus_Line
      name: EC (mS/cm)
      xCol: _time
      yCol: _value
      position: overlaid
      width: 6
      height: 3
      xPos: 6
      yPos: 0
      suffix: " mS/cm"
      decimalPlaces: 2
      axes:
        - base: "10"
          name: x
          scale: linear
        - base: "10"
          name: y
          scale: linear
      queries:
        - query: |-
            from(bucket: "planttime")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "sensors")
              |> filter(fn: (r) => r["sensor_type"] == "ec")
              |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
      colors:
        - id: base
          name: solstice
          type: text
          hex: "#FFB94A"
    - kind: Xy
      name: Pump (0=off, 1=on)
      xCol: _time
      yCol: _value
      position: overlaid
      geom: step
      width: 6
      height: 2
      xPos: 0
      yPos: 3
      axes:
        - base: "10"
          name: x
          scale: linear
        - base: "10"
          name: y
          scale: linear
      queries:
        - query: |-
            from(bucket: "planttime")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "plug_state")
              |> filter(fn: (r) => r["plug"] == "pump")
              |> aggregateWindow(every: v.windowPeriod, fn: last, createEmpty: false)
      colors:
        - id: base
          name: pool
          type: scale
          hex: "#00C9FF"
    - kind: Xy
      name: Light (0=off, 1=on)
      xCol: _time
      yCol: _value
      position: overlaid
      geom: step
      width: 6
      height: 2
      xPos: 6
      yPos: 3
      axes:
        - base: "10"
          name: x
          scale: linear
        - base: "10"
          name: y
          scale: linear
      queries:
        - query: |-
            from(bucket: "planttime")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "plug_state")
              |> filter(fn: (r) => r["plug"] == "light")
              |> aggregateWindow(every: v.windowPeriod, fn: last, createEmpty: false)
      colors:
        - id: base
          name: solstice
          type: scale
          hex: "#FFB94A"
    - kind: Single_Stat_Plus_Line
      name: Water Temperature
      xCol: _time
      yCol: _value
      position: overlaid
      width: 3
      height: 3
      xPos: 0
      yPos: 5
      suffix: " °C"
      decimalPlaces: 1
      axes:
        - base: "10"
          name: x
          scale: linear
        - base: "10"
          name: y
          scale: linear
      queries:
        - query: |-
            from(bucket: "planttime")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "sensors")
              |> filter(fn: (r) => r["sensor_type"] == "water_temperature")
              |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
      colors:
        - id: base
          name: laser
          type: text
          hex: "#00C9FF"
    - kind: Single_Stat_Plus_Line
      name: Air Temperature
      xCol: _time
      yCol: _value
      position: overlaid
      width: 3
      height: 3
      xPos: 3
      yPos: 5
      suffix: " °C"
      decimalPlaces: 1
      axes:
        - base: "10"
          name: x
          scale: linear
        - base: "10"
          name: y
          scale: linear
      queries:
        - query: |-
            from(bucket: "planttime")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "sensors")
              |> filter(fn: (r) => r["sensor_type"] == "air_temperature")
              |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
      colors:
        - id: base
          name: honeydew
          type: text
          hex: "#7CE490"
    - kind: Single_Stat_Plus_Line
      name: Humidity
      xCol: _time
      yCol: _value
      position: overlaid
      width: 3
      height: 3
      xPos: 6
      yPos: 5
      suffix: " %"
      decimalPlaces: 0
      axes:
        - base: "10"
          name: x
          scale: linear
        - base: "10"
          name: y
          scale: linear
      queries:
        - query: |-
            from(bucket: "planttime")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "sensors")
              |> filter(fn: (r) => r["sensor_type"] == "humidity")
              |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
      colors:
        - id: base
          name: sapphire
          type: text
          hex: "#3F3FBA"
    - kind: Single_Stat_Plus_Line
      name: Water Level
      xCol: _time
      yCol: _value
      position: overlaid
      width: 3
      height: 3
      xPos: 9
      yPos: 5
      suffix: " mm"
      decimalPlaces: 0
      axes:
        - base: "10"
          name: x
          scale: linear
        - base: "10"
          name: y
          scale: linear
      queries:
        - query: |-
            from(bucket: "planttime")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "sensors")
              |> filter(fn: (r) => r["sensor_type"] == "water_level")
              |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
      colors:
        - id: base
          name: pool
          type: text
          hex: "#00C9FF"
    - kind: Single_Stat_Plus_Line
      name: Pressure
      xCol: _time
      yCol: _value
      position: overlaid
      width: 12
      height: 3
      xPos: 0
      yPos: 8
      suffix: " hPa"
      decimalPlaces: 1
      axes:
        - base: "10"
          name: x
          scale: linear
        - base: "10"
          name: y
          scale: linear
      queries:
        - query: |-
            from(bucket: "planttime")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "sensors")
              |> filter(fn: (r) => r["sensor_type"] == "pressure")
              |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
      colors:
        - id: base
          name: ruby
          type: text
          hex: "#DC4E58"
