apiVersion: influxdata.com/v2alpha1
kind: Dashboard
metadata:
  name: planttime
spec:
  name: PlantTime
  description: Hydroponic sensor dashboard
  charts:
    - kind: Xy
      name: pH
      xCol: _time
      yCol: _value
      position: overlaid
      geom: line
      width: 6
      height: 3
      xPos: 0
      yPos: 0
      axes:
        - base: "10"
          name: x
          scale: linear
        - base: "10"
          name: y
          scale: linear
          suffix: " pH"
      queries:
        - query: |-
            from(bucket: "planttime1")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "sensors")
              |> filter(fn: (r) => r["sensor_type"] == "ph")
              |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
      colors:
        - id: base
          name: Viridian
          type: scale
          hex: "#32B08C"
        - id: mid
          name: Ocean
          type: scale
          hex: "#4591ED"
        - id: end
          name: Pool
          type: scale
          hex: "#7A65F2"
    - kind: Xy
      name: EC (mS/cm)
      xCol: _time
      yCol: _value
      position: overlaid
      geom: line
      width: 6
      height: 3
      xPos: 6
      yPos: 0
      axes:
        - base: "10"
          name: x
          scale: linear
        - base: "10"
          name: y
          scale: linear
          suffix: " mS/cm"
      queries:
        - query: |-
            from(bucket: "planttime1")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "sensors")
              |> filter(fn: (r) => r["sensor_type"] == "ec")
              |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
      colors:
        - id: base
          name: Solstice
          type: scale
          hex: "#FFB94A"
        - id: mid
          name: Ruby
          type: scale
          hex: "#F4CF31"
        - id: end
          name: Fire
          type: scale
          hex: "#DC4E58"
    - kind: Single_Stat_Plus_Line
      name: Water Temperature
      xCol: _time
      yCol: _value
      position: overlaid
      width: 3
      height: 3
      xPos: 0
      yPos: 3
      suffix: " °C"
      decimalPlaces: 1
      queries:
        - query: |-
            from(bucket: "planttime1")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "sensors")
              |> filter(fn: (r) => r["sensor_type"] == "water_temperature")
              |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
      colors:
        - id: base
          name: laser
          type: text
          hex: "#00C9FF"
    - kind: Single_Stat_Plus_Line
      name: Air Temperature
      xCol: _time
      yCol: _value
      position: overlaid
      width: 3
      height: 3
      xPos: 3
      yPos: 3
      suffix: " °C"
      decimalPlaces: 1
      queries:
        - query: |-
            from(bucket: "planttime1")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "sensors")
              |> filter(fn: (r) => r["sensor_type"] == "air_temperature")
              |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
      colors:
        - id: base
          name: honeydew
          type: text
          hex: "#7CE490"
    - kind: Single_Stat_Plus_Line
      name: Humidity
      xCol: _time
      yCol: _value
      position: overlaid
      width: 3
      height: 3
      xPos: 6
      yPos: 3
      suffix: " %"
      decimalPlaces: 0
      queries:
        - query: |-
            from(bucket: "planttime1")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "sensors")
              |> filter(fn: (r) => r["sensor_type"] == "humidity")
              |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
      colors:
        - id: base
          name: sapphire
          type: text
          hex: "#3F3FBA"
    - kind: Single_Stat_Plus_Line
      name: Water Level
      xCol: _time
      yCol: _value
      position: overlaid
      width: 3
      height: 3
      xPos: 9
      yPos: 3
      suffix: " mm"
      decimalPlaces: 0
      queries:
        - query: |-
            from(bucket: "planttime1")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "sensors")
              |> filter(fn: (r) => r["sensor_type"] == "water_level")
              |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
      colors:
        - id: base
          name: pool
          type: text
          hex: "#00C9FF"
    - kind: Xy
      name: All Temperatures
      xCol: _time
      yCol: _value
      position: overlaid
      geom: line
      width: 12
      height: 3
      xPos: 0
      yPos: 6
      axes:
        - base: "10"
          name: x
          scale: linear
        - base: "10"
          name: y
          scale: linear
          suffix: " °C"
      queries:
        - query: |-
            from(bucket: "planttime1")
              |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
              |> filter(fn: (r) => r["_measurement"] == "sensors")
              |> filter(fn: (r) => r["sensor_type"] == "water_temperature" or r["sensor_type"] == "air_temperature")
              |> aggregateWindow(every: v.windowPeriod, fn: mean, createEmpty: false)
      colors:
        - id: base
          name: laser
          type: scale
          hex: "#00C9FF"
        - id: mid
          name: pool
          type: scale
          hex: "#7CE490"
        - id: end
          name: honeydew
          type: scale
          hex: "#FFD400"
